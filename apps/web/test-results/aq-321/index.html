<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>AQ-321 parity screenshots</title>
  <style>
    body { margin: 24px; background: #111827; color: #f3f4f6; font: 14px/1.45 system-ui, sans-serif; }
    section { margin-bottom: 32px; }
    h1, h2 { margin: 0 0 12px; }
    .pair { display: grid; grid-template-columns: repeat(2, minmax(0, 1fr)); gap: 16px; }
    figure { margin: 0; border: 1px solid #273244; background: #0d1117; }
    figcaption { padding: 8px 10px; border-bottom: 1px solid #273244; color: #98a2b3; font: 12px ui-monospace, monospace; }
    img { display: block; width: 100%; height: auto; }
  </style>
</head>
<body>
  <h1>AQ-321 parity screenshots (1440x900)</h1>
  <section>
  <h2>pipelines</h2>
  <div class="pair">
    <figure><figcaption>Product</figcaption><img src="pipelines-product.png" alt="pipelines product screenshot"></figure>
    <figure><figcaption>Design reference</figcaption><img src="pipelines-design.png" alt="pipelines design screenshot"></figure>
  </div>
</section>
<section>
  <h2>work</h2>
  <div class="pair">
    <figure><figcaption>Product</figcaption><img src="work-product.png" alt="work product screenshot"></figure>
    <figure><figcaption>Design reference</figcaption><img src="work-design.png" alt="work design screenshot"></figure>
  </div>
</section>
<section>
  <h2>decisions</h2>
  <div class="pair">
    <figure><figcaption>Product</figcaption><img src="decisions-product.png" alt="decisions product screenshot"></figure>
    <figure><figcaption>Design reference</figcaption><img src="decisions-design.png" alt="decisions design screenshot"></figure>
  </div>
</section>
<section>
  <h2>learnings</h2>
  <div class="pair">
    <figure><figcaption>Product</figcaption><img src="learnings-product.png" alt="learnings product screenshot"></figure>
    <figure><figcaption>Design reference</figcaption><img src="learnings-design.png" alt="learnings design screenshot"></figure>
  </div>
</section>
</body>
</html>
