name: pre-commit

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  pre-commit:
    # Skip on Dependabot PRs: Dependabot bumps action versions in .github/workflows
    # and pre-commit's file-modifying hooks (end-of-file-fixer, trailing-whitespace,
    # mixed-line-ending) can conflict with bot-authored commits. Skipping keeps
    # Dependabot auto-merge-green. Required status checks on main still run the
    # real gates (build / lint / test / dependency-review).
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pre-commit environments
        uses: actions/cache@v5
        with:
          path: ~/.cache/pre-commit
          key: ${{ runner.os }}-pre-commit-${{ hashFiles('.pre-commit-config.yaml') }}

      - name: Install pre-commit
        run: python -m pip install --upgrade pip pre-commit

      - name: Run pre-commit on all files
        run: pre-commit run --all-files --show-diff-on-failure
