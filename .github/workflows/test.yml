name: test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        node-version: ["22"]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache pip downloads
        if: ${{ hashFiles('requirements*.txt', 'pyproject.toml', 'poetry.lock') != '' }}
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'poetry.lock') }}

      - name: Cache npm packages
        if: ${{ hashFiles('package-lock.json', 'frontend/package-lock.json') != '' }}
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-test-${{ hashFiles('package-lock.json', 'frontend/package-lock.json') }}

      - name: Install Python test dependencies
        shell: bash
        run: python -m pip install --upgrade pip .

      - name: Start Postgres
        shell: bash
        run: docker compose up -d db

      - name: Wait for Postgres
        shell: bash
        run: python apps/api/scripts/wait_for_db.py

      - name: Apply Alembic migrations
        shell: bash
        run: alembic -c apps/api/alembic.ini upgrade head

      - name: Audit strict submit schemas
        shell: bash
        run: python scripts/audit_strict_models.py

      - name: Run pytest
        shell: bash
        run: |
          set -euo pipefail
          if test -d tests || git ls-files 'test_*.py' '*_test.py' | grep -q .; then
            pytest
          else
            echo "No Python tests yet; skipping pytest."
          fi

      - name: Enforce Phase 2 safety coverage gate
        shell: bash
        run: |
          set -euo pipefail
          pytest \
            tests/unit/test_validator.py \
            tests/unit/test_transitions.py \
            tests/unit/test_dod.py \
            tests/unit/test_capability_enforcement.py \
            tests/unit/test_payload_caps.py \
            tests/unit/test_policy.py \
            --cov=agenticqueue_api.validator \
            --cov=agenticqueue_api.transitions \
            --cov=agenticqueue_api.dod \
            --cov=agenticqueue_api.capabilities \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=100

      - name: Stop Postgres
        if: ${{ always() }}
        shell: bash
        run: docker compose down

      - name: Install Node dependencies
        shell: bash
        run: |
          set -euo pipefail
          if test -f package-lock.json; then
            npm ci
          elif test -f package.json; then
            npm install
          else
            echo "No Node package manifest at repo root; skipping install."
          fi

      - name: Run vitest
        shell: bash
        run: |
          set -euo pipefail
          if test -f package.json && git ls-files '*.test.ts' '*.test.tsx' '*.spec.ts' '*.spec.tsx' | grep -q .; then
            npx vitest run
          else
            echo "No Vitest suite yet; skipping vitest."
          fi
