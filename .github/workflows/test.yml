name: test

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      AGENTICQUEUE_DATABASE_URL: postgresql+asyncpg://agenticqueue:agenticqueue@127.0.0.1:64329/agenticqueue
      AGENTICQUEUE_DB_PORT: "5432"
      AGENTICQUEUE_PGBOUNCER_PORT: "64329"
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        node-version: ["22"]
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}

      - name: Cache pip downloads
        if: ${{ hashFiles('requirements*.txt', 'pyproject.toml', 'poetry.lock') != '' }}
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-test-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'poetry.lock') }}

      - name: Cache npm packages
        if: ${{ hashFiles('package-lock.json', 'frontend/package-lock.json') != '' }}
        uses: actions/cache@v5
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-test-${{ hashFiles('package-lock.json', 'frontend/package-lock.json') }}

      - name: Install Node dependencies
        shell: bash
        run: npm ci

      - name: Install Python test dependencies
        shell: bash
        run: python -m pip install --upgrade pip .

      - name: Start Postgres + PgBouncer
        shell: bash
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml up -d db pgbouncer

      - name: Wait for Postgres
        shell: bash
        run: python apps/api/scripts/wait_for_db.py

      - name: Apply Alembic migrations
        shell: bash
        run: alembic -c apps/api/alembic.ini upgrade head

      - name: Audit strict submit schemas
        shell: bash
        run: python scripts/audit_strict_models.py

      - name: Run pytest
        shell: bash
        run: |
          set -euo pipefail
          if test -d tests || git ls-files 'test_*.py' '*_test.py' | grep -q .; then
            pytest --no-cov
          else
            echo "No Python tests yet; skipping pytest."
          fi

      - name: Run claim concurrency integration test
        shell: bash
        run: pytest --no-cov tests/integration/test_claim_concurrency_integration.py -x --timeout=120

      - name: Enforce Phase 2 safety coverage gate
        shell: bash
        run: |
          set -euo pipefail
          pytest --no-cov \
            tests/unit/test_validator.py \
            tests/unit/test_transitions.py \
            tests/unit/test_dod.py \
            tests/unit/test_capability_enforcement.py \
            tests/security/firewall/test_payload_caps.py \
            tests/unit/test_policy.py \
            --cov=agenticqueue_api.validator \
            --cov=agenticqueue_api.transitions \
            --cov=agenticqueue_api.dod \
            --cov=agenticqueue_api.capabilities \
            --cov-branch \
            --cov-report=term-missing \
            --cov-fail-under=100

      - name: Install Playwright Chromium
        shell: bash
        run: npx playwright install --with-deps chromium

      - name: Run Playwright smoke suite
        shell: bash
        run: npx playwright test --reporter=html

      - name: Upload Playwright report on failure
        if: ${{ failure() }}
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore

  firewall-fuzz:
    runs-on: ubuntu-latest
    env:
      AGENTICQUEUE_DATABASE_URL: postgresql+asyncpg://agenticqueue:agenticqueue@127.0.0.1:64329/agenticqueue
      AGENTICQUEUE_DB_PORT: "5432"
      AGENTICQUEUE_PGBOUNCER_PORT: "64329"
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip downloads
        if: ${{ hashFiles('requirements*.txt', 'pyproject.toml', 'poetry.lock') != '' }}
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-firewall-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'poetry.lock') }}

      - name: Install Python test dependencies
        shell: bash
        run: python -m pip install --upgrade pip uv .

      - name: Start Postgres + PgBouncer
        shell: bash
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml up -d db pgbouncer

      - name: Wait for Postgres
        shell: bash
        run: python apps/api/scripts/wait_for_db.py

      - name: Apply Alembic migrations
        shell: bash
        run: alembic -c apps/api/alembic.ini upgrade head

      - name: Run firewall fuzz suite
        shell: bash
        run: |
          set -euo pipefail
          uv run pytest \
            tests/security/firewall/ \
            tests/unit/test_secret_redaction.py \
            --cov-fail-under=100

      - name: Stop Postgres
        if: ${{ always() }}
        shell: bash
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml down

      - name: Stop Postgres
        if: ${{ always() }}
        shell: bash
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml down

      - name: Install Node dependencies
        shell: bash
        run: |
          set -euo pipefail
          if test -f package-lock.json; then
            npm ci
          elif test -f package.json; then
            npm install
          else
            echo "No Node package manifest at repo root; skipping install."
          fi

      - name: Run vitest
        shell: bash
        run: |
          set -euo pipefail
          if test -f package.json && git ls-files '*.test.ts' '*.test.tsx' '*.spec.ts' '*.spec.tsx' | grep -q .; then
            npx vitest run
          else
            echo "No Vitest suite yet; skipping vitest."
          fi

  rest-hardening-matrix:
    name: rest-hardening-matrix
    runs-on: ubuntu-latest
    env:
      AGENTICQUEUE_DATABASE_URL: postgresql+asyncpg://agenticqueue:agenticqueue@127.0.0.1:64329/agenticqueue
      AGENTICQUEUE_DB_PORT: "5432"
      AGENTICQUEUE_PGBOUNCER_PORT: "64329"
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Cache pip downloads
        if: ${{ hashFiles('requirements*.txt', 'pyproject.toml', 'poetry.lock') != '' }}
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-rest-hardening-${{ hashFiles('requirements*.txt', 'pyproject.toml', 'poetry.lock') }}

      - name: Install Python test dependencies
        shell: bash
        run: python -m pip install --upgrade pip uv .

      - name: Start Postgres + PgBouncer
        shell: bash
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml up -d db pgbouncer

      - name: Wait for Postgres
        shell: bash
        run: python apps/api/scripts/wait_for_db.py

      - name: Apply Alembic migrations
        shell: bash
        run: alembic -c apps/api/alembic.ini upgrade head

      - name: Run REST hardening matrix + soak
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          uv run python scripts/audit_rest_hardening.py \
            --output-json dist/rest-hardening-matrix.json \
            --soak-output-json dist/rest-hardening-soak.json \
            --soak-seconds 300 \
            --actors 100 \
            --rps-per-actor 10 \
            --max-read-p99-ms 200

      - name: Stop Postgres
        if: ${{ always() }}
        shell: bash
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml down

      - name: Upload REST hardening artifacts
        if: ${{ always() }}
        uses: actions/upload-artifact@v7
        with:
          name: rest-hardening-reports
          path: |
            dist/rest-hardening-matrix.json
            dist/rest-hardening-soak.json
          if-no-files-found: error

  supply-chain:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Install Python SBOM tooling
        shell: bash
        run: python -m pip install --upgrade pip cyclonedx-bom

      - name: Generate Python SBOM pre-flight
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          python -m venv .sbom-venv
          . .sbom-venv/bin/activate
          python -m pip install --upgrade pip .
          deactivate
          cyclonedx-py environment .sbom-venv --output-format JSON --output-file dist/sbom.cdx.json

      - name: Generate npm SBOM pre-flight when manifests exist
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t manifests < <(git ls-files '*package.json')
          if [ "${#manifests[@]}" -eq 0 ]; then
            echo "No npm manifests yet; skipping npm SBOM generation."
            exit 0
          fi

          manifest="package.json"
          if [ ! -f "$manifest" ]; then
            manifest="${manifests[0]}"
          fi

          manifest_dir="$(dirname "$manifest")"
          manifest_file="$(basename "$manifest")"

          pushd "$manifest_dir" >/dev/null
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi
          npx --yes @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file "$GITHUB_WORKSPACE/dist/sbom.node.cdx.json" \
            "$manifest_file"
          popd >/dev/null

      - name: Download Grype
        uses: anchore/scan-action/download-grype@v7
        id: grype

      - name: Update Grype database
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.grype.outputs.cmd }}" db update

      - name: Generate vulnerability report
        env:
          GRYPE_DB_VALIDATE_AGE: "false"
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.grype.outputs.cmd }}" dir:. --output json > dist/grype-report.json

      - name: Upload supply-chain artifacts
        uses: actions/upload-artifact@v7
        with:
          name: supply-chain
          path: |
            dist/sbom.cdx.json
            dist/sbom.node.cdx.json
            dist/grype-report.json
          if-no-files-found: ignore
