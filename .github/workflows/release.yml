name: release

on:
  release:
    types:
      - published

permissions:
  actions: read
  contents: write
  id-token: write

jobs:
  release-assets:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}
    outputs:
      tarball_name: ${{ steps.bundle.outputs.name }}
      provenance_name: ${{ steps.bundle.outputs.provenance_name }}
      subjects_b64: ${{ steps.bundle.outputs.subjects_b64 }}
      node_sbom_generated: ${{ steps.node_sbom.outputs.generated }}
      vuln_summary: ${{ steps.vuln.outputs.summary }}
    steps:
      - name: Check out release tag
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install Cosign
        uses: sigstore/cosign-installer@v4.1.0

      - name: Check Cosign installation
        shell: bash
        run: |
          set -euo pipefail
          cosign version

      - name: Install Python release tooling
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip cyclonedx-bom

      - name: Build source tarball
        id: bundle
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          version="${TAG_NAME#v}"
          tarball="agenticqueue-${version}.tar.gz"
          git archive \
            --format=tar.gz \
            --prefix="agenticqueue-${version}/" \
            --output="dist/${tarball}" \
            HEAD
          pushd dist >/dev/null
          subjects_b64="$(sha256sum "$tarball" | base64 -w 0)"
          popd >/dev/null
          {
            echo "path=dist/${tarball}"
            echo "name=${tarball}"
            echo "provenance_name=${tarball}.intoto.jsonl"
            echo "subjects_b64=${subjects_b64}"
          } >> "$GITHUB_OUTPUT"

      - name: Generate Python SBOM
        shell: bash
        run: |
          set -euo pipefail
          python -m venv .sbom-venv
          . .sbom-venv/bin/activate
          python -m pip install --upgrade pip .
          deactivate
          cyclonedx-py environment .sbom-venv --output-format JSON --output-file dist/sbom.cdx.json

      - name: Generate npm SBOM when a manifest exists
        id: node_sbom
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t manifests < <(git ls-files '*package.json')
          if [ "${#manifests[@]}" -eq 0 ]; then
            echo "generated=false" >> "$GITHUB_OUTPUT"
            echo "No npm manifests yet; skipping npm SBOM generation."
            exit 0
          fi

          manifest="package.json"
          if [ ! -f "$manifest" ]; then
            manifest="${manifests[0]}"
          fi

          manifest_dir="$(dirname "$manifest")"
          manifest_file="$(basename "$manifest")"

          pushd "$manifest_dir" >/dev/null
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install
          fi
          npx --yes @cyclonedx/cyclonedx-npm \
            --output-format JSON \
            --output-file "$GITHUB_WORKSPACE/dist/sbom.node.cdx.json" \
            "$manifest_file"
          popd >/dev/null

          echo "generated=true" >> "$GITHUB_OUTPUT"

      - name: Download Grype
        uses: anchore/scan-action/download-grype@v3
        id: grype

      - name: Update Grype database
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.grype.outputs.cmd }}" db update

      - name: Generate vulnerability report
        env:
          GRYPE_DB_VALIDATE_AGE: "false"
        shell: bash
        run: |
          set -euo pipefail
          "${{ steps.grype.outputs.cmd }}" dir:. --output json > dist/grype-report.json

      - name: Summarize vulnerabilities
        id: vuln
        shell: bash
        run: |
          set -euo pipefail
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          matches = json.loads(Path("dist/grype-report.json").read_text(encoding="utf-8")).get("matches", [])
          counts = {}
          for match in matches:
              vulnerability = match.get("vulnerability") or {}
              severity = (vulnerability.get("severity") or "UNKNOWN").upper()
              counts[severity] = counts.get(severity, 0) + 1

          ordered = ["CRITICAL", "HIGH", "MEDIUM", "LOW", "NEGLIGIBLE", "UNKNOWN"]
          summary = ",".join(f"{severity.lower()}={counts.get(severity, 0)}" for severity in ordered)
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as handle:
              handle.write(f"total={len(matches)}\n")
              handle.write(f"summary={summary}\n")
          PY

      - name: Sign release blobs with Sigstore keyless
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            "${{ steps.bundle.outputs.path }}"
            "dist/sbom.cdx.json"
            "dist/grype-report.json"
          )
          if [ "${{ steps.node_sbom.outputs.generated }}" = "true" ]; then
            assets+=("dist/sbom.node.cdx.json")
          fi

          for asset in "${assets[@]}"; do
            bundle="dist/$(basename "$asset").sigstore.json"
            cosign sign-blob --yes --bundle "$bundle" "$asset"
          done

      - name: Verify Sigstore bundles
        shell: bash
        env:
          COSIGN_CERTIFICATE_IDENTITY_REGEXP: ^https://github.com/${{ github.repository }}/\.github/workflows/release.yml@refs/tags/
        run: |
          set -euo pipefail
          assets=(
            "${{ steps.bundle.outputs.path }}"
            "dist/sbom.cdx.json"
            "dist/grype-report.json"
          )
          if [ "${{ steps.node_sbom.outputs.generated }}" = "true" ]; then
            assets+=("dist/sbom.node.cdx.json")
          fi

          for asset in "${assets[@]}"; do
            bundle="dist/$(basename "$asset").sigstore.json"
            cosign verify-blob \
              --bundle "$bundle" \
              --certificate-identity-regexp "$COSIGN_CERTIFICATE_IDENTITY_REGEXP" \
              --certificate-oidc-issuer https://token.actions.githubusercontent.com \
              "$asset"
          done

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          assets=(
            "${{ steps.bundle.outputs.path }}"
            "dist/$(basename "${{ steps.bundle.outputs.path }}").sigstore.json"
            "dist/sbom.cdx.json"
            "dist/sbom.cdx.json.sigstore.json"
            "dist/grype-report.json"
            "dist/grype-report.json.sigstore.json"
          )
          if [ "${{ steps.node_sbom.outputs.generated }}" = "true" ]; then
            assets+=(
              "dist/sbom.node.cdx.json"
              "dist/sbom.node.cdx.json.sigstore.json"
            )
          fi
          gh release upload "$TAG_NAME" "${assets[@]}" --clobber

      - name: Upload tarball for provenance verification
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: ${{ steps.bundle.outputs.path }}
          if-no-files-found: error
          retention-days: 5

  provenance:
    needs: release-assets
    permissions:
      actions: read
      contents: write
      id-token: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.release-assets.outputs.subjects_b64 }}
      provenance-name: ${{ needs.release-assets.outputs.provenance_name }}
      upload-assets: true
      upload-tag-name: ${{ github.event.release.tag_name }}

  verify-provenance:
    needs:
      - release-assets
      - provenance
    runs-on: ubuntu-latest
    env:
      TAG_NAME: ${{ github.event.release.tag_name }}
    steps:
      - name: Download release tarball
        uses: actions/download-artifact@v4
        with:
          name: release-tarball
          path: dist

      - name: Download provenance bundle
        uses: actions/download-artifact@v4
        with:
          name: ${{ needs.release-assets.outputs.provenance_name }}
          path: dist

      - name: Install slsa-verifier
        shell: bash
        run: |
          set -euo pipefail
          curl -sSLo /usr/local/bin/slsa-verifier \
            https://github.com/slsa-framework/slsa-verifier/releases/download/v2.7.1/slsa-verifier-linux-amd64
          chmod +x /usr/local/bin/slsa-verifier

      - name: Verify release provenance
        shell: bash
        run: |
          set -euo pipefail
          slsa-verifier verify-artifact \
            "dist/${{ needs.release-assets.outputs.tarball_name }}" \
            --provenance-path "dist/${{ needs.release-assets.outputs.provenance_name }}" \
            --source-uri github.com/agenticqueue/agenticqueue \
            --source-tag "$TAG_NAME" \
            --builder-id "https://github.com/slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@refs/tags/v2.1.0"

  update-release-notes:
    needs:
      - release-assets
      - provenance
      - verify-provenance
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
      TAG_NAME: ${{ github.event.release.tag_name }}
      VULN_SUMMARY: ${{ needs.release-assets.outputs.vuln_summary }}
      PROVENANCE_NAME: ${{ needs.release-assets.outputs.provenance_name }}
      NODE_SBOM_GENERATED: ${{ needs.release-assets.outputs.node_sbom_generated }}
    steps:
      - name: Update release notes with supply-chain summary
        env:
          GH_TOKEN: ${{ github.token }}
          VULN_SUMMARY: ${{ needs.release-assets.outputs.vuln_summary }}
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p dist
          gh release view "$TAG_NAME" --json body --jq '.body // ""' > dist/release-body.txt

          version="${TAG_NAME#v}"
          tarball="agenticqueue-${version}.tar.gz"
          asset_summary="${tarball}, ${PROVENANCE_NAME}, ${tarball}.sigstore.json, sbom.cdx.json, sbom.cdx.json.sigstore.json, grype-report.json, grype-report.json.sigstore.json"
          if [ "$NODE_SBOM_GENERATED" = "true" ]; then
            asset_summary="${asset_summary}, sbom.node.cdx.json, sbom.node.cdx.json.sigstore.json"
          fi
          export ASSET_SUMMARY="$asset_summary"

          python - <<'PY'
          import os
          import re
          from pathlib import Path

          start_marker = "<!-- aq-supply-chain:start -->"
          end_marker = "<!-- aq-supply-chain:end -->"
          body_path = Path("dist/release-body.txt")
          notes_path = Path("dist/release-notes.txt")

          body = body_path.read_text(encoding="utf-8")
          section = "\n".join(
              [
                  start_marker,
                  "## Supply chain",
                  f"- Vulnerabilities: {os.environ['VULN_SUMMARY']}",
                  f"- Assets: {os.environ['ASSET_SUMMARY']}",
                  end_marker,
              ]
          )

          pattern = re.compile(
              rf"{re.escape(start_marker)}.*?{re.escape(end_marker)}",
              re.DOTALL,
          )
          if pattern.search(body):
              updated = pattern.sub(section, body)
          elif body.strip():
              updated = body.rstrip() + "\n\n" + section + "\n"
          else:
              updated = section + "\n"

          notes_path.write_text(updated, encoding="utf-8")
          PY

          gh release edit "$TAG_NAME" --notes-file dist/release-notes.txt
