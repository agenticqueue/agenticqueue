name: build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Build Docker scaffolds
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t dockerfiles < <(find . -path './.git' -prune -o -name 'Dockerfile*' -print | sort)

          if [ "${#dockerfiles[@]}" -eq 0 ]; then
            echo "No Dockerfiles yet; build skeleton is in place."
            exit 0
          fi

          for dockerfile in "${dockerfiles[@]}"; do
            if [[ "$dockerfile" == ./apps/*/Dockerfile* ]]; then
              context_dir="."
            else
              context_dir="$(dirname "$dockerfile")"
            fi
            tag="agenticqueue-ci-$(echo "$dockerfile" | tr '/.' '--' | tr '[:upper:]' '[:lower:]')"
            echo "Building $dockerfile from $context_dir"
            docker build --file "$dockerfile" --tag "$tag" "$context_dir"
          done
  docker-compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v6

      - name: Build and start compose stack
        shell: bash
        env:
          AQ_ADMIN_EMAIL: admin@localhost
        run: docker compose -f docker-compose.yml up -d --build

      - name: Validate dev override config
        shell: bash
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml config --quiet

      - name: Wait for API health
        shell: bash
        run: |
          set -euo pipefail
          for _ in {1..18}; do
            if curl -fsS http://localhost:8000/v1/health > /tmp/aq-api-health.json; then
              cat /tmp/aq-api-health.json
              exit 0
            fi
            sleep 5
          done
          docker compose -f docker-compose.yml ps
          exit 1

      - name: Wait for web health
        shell: bash
        run: |
          set -euo pipefail
          for _ in {1..18}; do
            if curl -fsS http://localhost:3000/api/health > /tmp/aq-web-health.json; then
              cat /tmp/aq-web-health.json
              exit 0
            fi
            sleep 5
          done
          docker compose -f docker-compose.yml ps
          exit 1

      - name: Smoke test login shell HTML
        shell: bash
        run: curl -fsSL http://localhost:3000/ | grep "AgenticQueue"

      - name: Exercise first-run bootstrap flow
        shell: bash
        run: |
          set -euo pipefail
          curl -fsS http://localhost:8000/api/auth/bootstrap_status > /tmp/bootstrap-status-before.json
          python - <<'PY'
          import json
          with open("/tmp/bootstrap-status-before.json", encoding="utf-8") as handle:
              payload = json.load(handle)
          assert payload == {"needs_bootstrap": True}, payload
          PY

          curl -fsS \
            -D /tmp/bootstrap-headers.txt \
            -o /tmp/bootstrap-response.json \
            -H 'Content-Type: application/json' \
            -d '{"email":"admin@localhost","password":"CorrectHorse12!"}' \
            http://localhost:8000/api/auth/bootstrap_admin
          python - <<'PY'
          with open("/tmp/bootstrap-headers.txt", encoding="utf-8") as handle:
              headers = handle.read().lower()
          assert "set-cookie: aq_session=" in headers
          PY
          python - <<'PY'
          import json
          import re
          with open("/tmp/bootstrap-response.json", encoding="utf-8") as handle:
              payload = json.load(handle)
          assert payload["user"]["email"] == "admin@localhost", payload
          assert payload["user"]["role"] == "owner", payload
          assert re.fullmatch(r"aq_live_[A-Za-z0-9]{32,}", payload["first_token"])
          PY

          curl -fsS http://localhost:8000/api/auth/bootstrap_status > /tmp/bootstrap-status-after.json
          python - <<'PY'
          import json
          with open("/tmp/bootstrap-status-after.json", encoding="utf-8") as handle:
              payload = json.load(handle)
          assert payload == {"needs_bootstrap": False}, payload
          PY

      - name: Verify API health from the host
        shell: bash
        run: curl -fsS http://localhost:8000/v1/health | grep '"status":"ok"'

      - name: Verify web reaches API on the compose network
        shell: bash
        run: docker compose -f docker-compose.yml exec -T web curl -fsS http://api:8000/v1/health | grep '"status":"ok"'

      - name: Tear down compose stack
        if: ${{ always() }}
        shell: bash
        run: docker compose -f docker-compose.yml down
