name: build

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build Docker scaffolds
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t dockerfiles < <(find . -path './.git' -prune -o -name 'Dockerfile*' -print | sort)

          if [ "${#dockerfiles[@]}" -eq 0 ]; then
            echo "No Dockerfiles yet; build skeleton is in place."
            exit 0
          fi

          for dockerfile in "${dockerfiles[@]}"; do
            if [[ "$dockerfile" == ./apps/*/Dockerfile* ]]; then
              context_dir="."
            else
              context_dir="$(dirname "$dockerfile")"
            fi
            tag="agenticqueue-ci-$(echo "$dockerfile" | tr '/.' '--' | tr '[:upper:]' '[:lower:]')"
            echo "Building $dockerfile from $context_dir"
            docker build --file "$dockerfile" --tag "$tag" "$context_dir"
          done
  docker-compose-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Build and start compose stack
        shell: bash
        run: docker compose -f docker-compose.yml up -d --build

      - name: Validate dev override config
        shell: bash
        run: docker compose -f docker-compose.yml -f docker-compose.override.yml config --quiet

      - name: Wait for API health
        shell: bash
        run: |
          set -euo pipefail
          for _ in {1..18}; do
            if curl -fsS http://localhost:8000/v1/health > /tmp/aq-api-health.json; then
              cat /tmp/aq-api-health.json
              exit 0
            fi
            sleep 5
          done
          docker compose -f docker-compose.yml ps
          exit 1

      - name: Wait for web health
        shell: bash
        run: |
          set -euo pipefail
          for _ in {1..18}; do
            if curl -fsS http://localhost:3000/api/health > /tmp/aq-web-health.json; then
              cat /tmp/aq-web-health.json
              exit 0
            fi
            sleep 5
          done
          docker compose -f docker-compose.yml ps
          exit 1

      - name: Smoke test login shell HTML
        shell: bash
        run: curl -fsS http://localhost:3000/ | grep "AgenticQueue"

      - name: Verify API health from the host
        shell: bash
        run: curl -fsS http://localhost:8000/v1/health | grep '"status":"ok"'

      - name: Verify web reaches API on the compose network
        shell: bash
        run: docker compose -f docker-compose.yml exec -T web curl -fsS http://api:8000/v1/health | grep '"status":"ok"'

      - name: Tear down compose stack
        if: ${{ always() }}
        shell: bash
        run: docker compose -f docker-compose.yml down
