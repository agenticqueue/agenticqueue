services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-agenticqueue}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-agenticqueue}
      POSTGRES_USER: ${POSTGRES_USER:-agenticqueue}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-agenticqueue} -d ${POSTGRES_DB:-agenticqueue}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - agenticqueue_postgres_data:/var/lib/postgresql/data

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-agenticqueue}:${POSTGRES_PASSWORD:-agenticqueue}@db:5432/${POSTGRES_DB:-agenticqueue}
      LISTEN_PORT: 6432
      AUTH_TYPE: scram-sha-256
      POOL_MODE: transaction
      DEFAULT_POOL_SIZE: 25
      MAX_CLIENT_CONN: 200
      RESERVE_POOL_SIZE: 5
      MAX_PREPARED_STATEMENTS: 0
      SERVER_RESET_QUERY_ALWAYS: 1
      ADMIN_USERS: ${POSTGRES_USER:-agenticqueue}
      STATS_USERS: ${POSTGRES_USER:-agenticqueue}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -h localhost -p 6432 -U ${POSTGRES_USER:-agenticqueue}",
        ]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      pgbouncer:
        condition: service_healthy
    environment:
      AGENTICQUEUE_DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-agenticqueue}:${POSTGRES_PASSWORD:-agenticqueue}@pgbouncer:6432/${POSTGRES_DB:-agenticqueue}?prepared_statement_cache_size=0
      AGENTICQUEUE_TOKEN_SIGNING_SECRET: ${AGENTICQUEUE_TOKEN_SIGNING_SECRET:-agenticqueue-dev-token-signing-secret}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "curl -f http://localhost:8000/v1/health || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${AGENTICQUEUE_API_PORT:-8000}:8000"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    environment:
      AQ_API_URL: http://api:8000
      AGENTICQUEUE_API_BASE_URL: http://api:8000
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --spider http://localhost:3000/api/health || exit 1",
        ]
      interval: 5s
      timeout: 5s
      retries: 20
    ports:
      - "${AGENTICQUEUE_WEB_PORT:-3000}:3000"

volumes:
  agenticqueue_postgres_data:
